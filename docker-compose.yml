# docker-compose.yml
version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Pass your Lemma API key here
      - LEMMA_API_KEY=${LEMMA_API_KEY}
      # Optional: For GitHub Integration
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME}
    restart: unless-stopped

  frontend:
    build: ./Frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped